name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

env:
  MACOSX_DEPLOYMENT_TARGET: "12.0"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
      changelog: ${{ steps.changelog.outputs.body }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            BODY=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ github.ref_name }}" \
              -f previous_tag_name="$PREV_TAG" \
              --jq '.body')
          else
            BODY=$(gh api repos/${{ github.repository }}/releases/generate-notes \
              -f tag_name="${{ github.ref_name }}" \
              --jq '.body')
          fi
          if [ -z "$BODY" ]; then
            BODY="Bug fixes and improvements."
          fi
          DOWNLOADS=$(cat <<'DOWNLOADS_EOF'
          ## Downloads
          - **Windows desktop:** Use `HarnessKit-windows-x64-installer.exe` first. `HarnessKit-windows-x64.msi` is the alternate enterprise-friendly package.
          - **macOS desktop:** A desktop dmg is published only for signed macOS builds. If no dmg is attached, signing/notarization is not configured for that release yet.
          - **CLI assets:** Files beginning with `hk-cli-` are command-line binaries, not desktop applications.
          DOWNLOADS_EOF
          )
          BODY="$BODY

          $DOWNLOADS"
          {
            echo "body<<CHANGELOG_EOF"
            echo "$BODY"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.ref_name }}" \
            -f name="HarnessKit ${{ github.ref_name }}" \
            -f body="${{ steps.changelog.outputs.body }}" \
            -F draft=true \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  release-desktop:
    needs: create-release
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            arch: arm64
          - target: x86_64-apple-darwin
            arch: x64
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Determine macOS signing mode
        id: macos_signing
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ] && [ -n "$APPLE_CERTIFICATE_PASSWORD" ] && [ -n "$APPLE_SIGNING_IDENTITY" ] && [ -n "$APPLE_ID" ] && [ -n "$APPLE_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            echo "mode=signed" >> "$GITHUB_OUTPUT"
          else
            echo "mode=unsigned" >> "$GITHUB_OUTPUT"
          fi

      - name: Import Apple certificate
        if: steps.macos_signing.outputs.mode == 'signed'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm certificate.p12

      - name: Build signed desktop app
        if: steps.macos_signing.outputs.mode == 'signed'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          releaseBody: ${{ needs.create-release.outputs.changelog }}
          tauriScript: cargo tauri
          args: --target ${{ matrix.target }} --config crates/hk-desktop/tauri.macos.conf.json

      - name: Skip unsigned macOS desktop artifact
        if: steps.macos_signing.outputs.mode == 'unsigned'
        shell: bash
        run: |
          echo "Skipping macOS desktop dmg publish because Apple signing/notarization secrets are missing."

      - name: Build CLI (with embedded web frontend)
        run: |
          npm run build
          cargo build --release --target ${{ matrix.target }} -p hk-cli

      - name: Upload CLI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp "target/${{ matrix.target }}/release/hk" "hk-cli-macos-${{ matrix.arch }}"
          gh release upload "${{ github.ref_name }}" "hk-cli-macos-${{ matrix.arch }}" --clobber

  release-desktop-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Windows desktop installers
        shell: bash
        run: |
          npm run build
          cargo tauri build --target x86_64-pc-windows-msvc --config crates/hk-desktop/tauri.windows.conf.json --bundles nsis,msi

      - name: Validate and upload Windows desktop assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $bundleRoot = "target/x86_64-pc-windows-msvc/release/bundle"
          $nsis = Get-ChildItem "$bundleRoot/nsis/*.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          $msi = Get-ChildItem "$bundleRoot/msi/*.msi" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $nsis) { throw "Missing NSIS installer output" }
          if (-not $msi) { throw "Missing MSI output" }
          Copy-Item $nsis.FullName "HarnessKit-windows-x64-installer.exe"
          Copy-Item $msi.FullName "HarnessKit-windows-x64.msi"
          gh release upload "${{ github.ref_name }}" "HarnessKit-windows-x64-installer.exe" --clobber
          gh release upload "${{ github.ref_name }}" "HarnessKit-windows-x64.msi" --clobber

  release-cli-linux:
    needs: create-release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: x86_64-unknown-linux-musl

      - name: Install musl toolchain
        run: sudo apt-get update && sudo apt-get install -y musl-tools perl make

      - name: Install frontend dependencies
        run: npm ci

      - name: Build CLI (with embedded web frontend)
        run: |
          npm run build
          cargo build --release -p hk-cli --target x86_64-unknown-linux-musl

      - name: Upload CLI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cp target/x86_64-unknown-linux-musl/release/hk hk-cli-linux-x64
          gh release upload "${{ github.ref_name }}" hk-cli-linux-x64 --clobber

  release-cli-windows:
    needs: create-release
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Install frontend dependencies
        run: npm ci

      - name: Build CLI (with embedded web frontend)
        run: |
          npm run build
          cargo build --release -p hk-cli

      - name: Upload CLI to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cp target/release/hk.exe hk-cli-windows-x64.exe
          gh release upload "${{ github.ref_name }}" hk-cli-windows-x64.exe --clobber
